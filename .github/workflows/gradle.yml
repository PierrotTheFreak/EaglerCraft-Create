name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      task:
        description: 'Gradle task to run (e.g. makeMainWasmClientBundle, build, test)'
        required: false
        default: 'build'

concurrency:
  group: gradle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build project
        run: ./gradlew ${{ inputs.task || 'build' }} --no-daemon

      - name: List build outputs (debug)
        if: always()
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo "=== build/ directory (if exists) ==="
          find build -type f 2>/dev/null | head -60 || echo "(no build/ dir)"
          echo "=== Any .html files anywhere ==="
          find . -name "*.html" -not -path "./.git/*" 2>/dev/null
          echo "=== Any .wasm files anywhere ==="
          find . -name "*.wasm" -not -path "./.git/*" 2>/dev/null

      - name: Commit build output files
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add build outputs, bypassing .gitignore
          # -f means "ignore .gitignore rules" so build/ files get staged
          git add -f build/ 2>/dev/null || true

          # Also force-add common output locations your task might use
          git add -f *.html 2>/dev/null || true
          git add -f *.js 2>/dev/null || true
          git add -f *.wasm 2>/dev/null || true
          git add -f dist/ 2>/dev/null || true
          git add -f out/ 2>/dev/null || true
          git add -f output/ 2>/dev/null || true
          git add -f www/ 2>/dev/null || true
          git add -f web/ 2>/dev/null || true
          git add -f public/ 2>/dev/null || true

          # Check if anything was actually staged
          if git diff --cached --quiet; then
            echo "No build outputs to commit."
          else
            echo "Staged files:"
            git diff --cached --name-only
            git commit -m "ci: build output from '${{ inputs.task || 'build' }}' [skip ci]"
            git push
            echo "Build outputs committed and pushed."
          fi

  dependency-submission:

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4